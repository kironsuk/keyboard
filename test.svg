<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Draw the sky background -->
  <rect width="100%" height="100%" fill="skyblue" />
  
  <!-- Draw the lawn -->
  <rect y="150" width="100%" height="50" fill="green" />
  
  <!-- Draw the house body -->
  <rect x="50" y="80" width="100" height="70" fill="burlywood" stroke="black" />
  
  <!-- Draw the house roof -->
  <polygon points="50,80 150,80 100,40" fill="saddlebrown" stroke="black" />
  
  <!-- Draw the door -->
  <rect x="90" y="110" width="20" height="40" fill="sienna" stroke="black" />
  
  <!-- Draw the windows -->
  <rect x="60" y="90" width="20" height="20" fill="lightblue" stroke="black" />
  <rect x="120" y="90" width="20" height="20" fill="lightblue" stroke="black" />
</svg>
